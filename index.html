<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Housing Cost Comparison</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Housing Cost Comparison</h1>
      <p class="subtitle">Per person, per semester · AY 2026–27</p>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('on', this)">On-campus</button>
        <button class="filter-btn" onclick="setFilter('off', this)">Off-campus</button>
        <button class="filter-btn" onclick="setFilter('utils', this)">Utilities</button>
        <button class="filter-btn" onclick="setFilter('furnished', this)">Furnished</button>
      </div>

      <div class="legend">
        <span><div class="legend-dot low"></div> Lower cost</span>
        <span><div class="legend-dot mid"></div> Mid range</span>
        <span><div class="legend-dot high"></div> Higher cost</span>
      </div>

      <table>
        <thead>
          <tr>
            <th onclick="sortTable('name')">Property</th>
            <th onclick="sortTable('unit')">Unit</th>
            <th onclick="sortTable('cost')">Cost</th>
            <th>Utilities</th>
            <th>Parking</th>
            <th>Furnished</th>
            <th>Distance</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
